<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nền Móng Việt Nam - Gửi Nhiều Ảnh</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; color: #333; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; border-top: 10px solid #f39c12; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 5px 0; color: #2c3e50; font-size: 1.1rem; text-align: center; text-transform: uppercase; }
        p { margin: 0 0 20px 0; font-size: 0.8rem; text-align: center; color: #7f8c8d; }
        .upload-box { border: 2px dashed #dcdde1; padding: 25px; text-align: center; border-radius: 8px; cursor: pointer; background: #f9f9f9; }
        #uploadBtn { background: #2c3e50; color: #f39c12; border: none; padding: 15px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        #uploadBtn:disabled { background: #bdc3c7; color: #fff; }
        #status { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: 600; }
        .file-list { margin-top: 10px; font-size: 0.8rem; color: #2980b9; max-height: 100px; overflow-y: auto; text-align: left; padding: 5px; background: #f0f0f0; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>NỀN MÓNG VIỆT NAM</h2>
    <p>Hệ thống thu thập dữ liệu (Gửi nhiều ảnh/video)</p>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span id="label">📸 Bấm để chọn NHIỀU ảnh/video</span>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none">
        <div id="fileList" class="file-list"></div>
    </div>
    
    <button id="uploadBtn">GỬI TẤT CẢ VỀ DRIVE</button>
    <div id="status"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUJV6jxJ6LiPVlp9y4n2UhhqyIRupZbeybhutoffJyp0qXxPEKp6IkTHV5y8Mzh7Fc/exec";

    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const fileListDiv = document.getElementById('fileList');
    const label = document.getElementById('label');

    fileInput.onchange = () => {
        const files = fileInput.files;
        if(files.length > 0) {
            fileListDiv.style.display = "block";
            fileListDiv.innerHTML = `<b>Đã chọn ${files.length} tệp:</b><br>` + 
                Array.from(files).map(f => "- " + f.name).join('<br>');
            label.innerText = "Bấm để chọn lại";
        }
    };

    // Hàm bổ trợ để đọc file dưới dạng Base64 (dùng Promise để chạy tuần tự)
    const readFileAsBase64 = (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });
    };

    uploadBtn.onclick = async () => {
        const files = fileInput.files;
        if (files.length === 0) return alert("Anh chưa chọn ảnh nào ạ!");

        uploadBtn.disabled = true;
        let successCount = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            status.innerText = `⏳ Đang gửi tệp ${i + 1}/${files.length}: ${file.name}`;
            status.style.color = "#d35400";

            try {
                const base64 = await readFileAsBase64(file);
                const payload = { 
                    base64: base64, 
                    type: file.type, 
                    name: "NMNV_" + new Date().getTime() + "_" + file.name 
                };

                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if (result.status === "success") successCount++;

            } catch (error) {
                console.error("Lỗi khi gửi tệp:", file.name, error);
                // Vẫn tiếp tục với tệp tiếp theo
            }
        }

        if (successCount === files.length) {
            status.innerText = `✅ Đã gửi thành công tất cả ${successCount} tệp!`;
            status.style.color = "#27ae60";
        } else {
            status.innerText = `⚠️ Hoàn thành: Gửi được ${successCount}/${files.length} tệp.`;
            status.style.color = "#f39c12";
        }
        
        fileInput.value = "";
        fileListDiv.innerHTML = "";
        fileListDiv.style.display = "none";
        label.innerText = "📸 Bấm để tiếp tục gửi ảnh khác";
        uploadBtn.disabled = false;
    };
</script>

</body>
</html>
