<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nền Móng Việt Nam - Hệ thống Pro</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .card { background: #fff; color: #333; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; border-top: 10px solid #f39c12; }
        h2 { text-align: center; color: #2c3e50; font-size: 1.2rem; margin-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        select, input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .upload-box { border: 2px dashed #f39c12; padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; margin-bottom: 15px; background: #fffcf5; }
        #uploadBtn { background: #2c3e50; color: #f39c12; border: none; padding: 15px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #resultArea { margin-top: 15px; font-size: 0.8rem; background: #eee; padding: 10px; border-radius: 5px; display: none; max-height: 150px; overflow-y: auto; }
        .status-msg { text-align: center; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>NỀN MÓNG VIỆT NAM</h2>
    <p style="text-align:center; font-size:0.8rem; margin-top:0;">Hệ thống xử lý ảnh hiện trường tự động</p>

    <div class="form-group">
        <label>1. Phân loại danh mục (Auto Folder)</label>
        <select id="category">
            <option value="May_Moc_Thiet_Bi">Máy móc & Thiết bị</option>
            <option value="Nhan_Su_Cong_Truong">Nhân sự công trường</option>
            <option value="Tien_Do_Thi_Cong">Tiến độ thi công</option>
            <option value="Bien_Ban_Nghiem_Thu">Biên bản & Nghiệm thu</option>
        </select>
    </div>

    <div class="options">
        <label><input type="checkbox" id="compress" checked> Nén ảnh (Giảm dung lượng)</label>
        <label><input type="checkbox" id="watermark" checked> Đóng dấu logo/text</label>
        <label><input type="checkbox" id="copyUrl"> Tự động Copy URL</label>
        <label><input type="checkbox" id="showResult"> Hiện danh sách kết quả</label>
    </div>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <span id="labelText">📸 Chọn hoặc Chụp nhiều ảnh</span>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    </div>

    <button id="uploadBtn">XỬ LÝ & GỬI VỀ DRIVE</button>
    <div id="status" class="status-msg"></div>
    <div id="resultArea"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUJV6jxJ6LiPVlp9y4n2UhhqyIRupZbeybhutoffJyp0qXxPEKp6IkTHV5y8Mzh7Fc/exec";

    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');

    fileInput.onchange = () => {
        document.getElementById('labelText').innerText = "Đã chọn " + fileInput.files.length + " ảnh";
    };

    // Hàm nén và đóng dấu ảnh bằng Canvas
    async function processImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Thiết lập kích thước nén (ví dụ tối đa 1200px)
                    let width = img.width;
                    let height = img.height;
                    const max_size = 1200;
                    if (document.getElementById('compress').checked) {
                        if (width > height && width > max_size) { height *= max_size / width; width = max_size; }
                        else if (height > max_size) { width *= max_size / height; height = max_size; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // Đóng dấu chữ nếu được chọn
                    if (document.getElementById('watermark').checked) {
                        ctx.font = "bold 24px Arial";
                        ctx.fillStyle = "rgba(243, 156, 18, 0.6)"; // Màu cam Nền Móng VN
                        ctx.fillText("Nền Móng Việt Nam", 20, height - 20);
                        ctx.font = "14px Arial";
                        ctx.fillText(new Date().toLocaleString(), 20, height - 50);
                    }

                    const quality = document.getElementById('compress').checked ? 0.7 : 1.0;
                    resolve(canvas.toDataURL("image/jpeg", quality).split(',')[1]);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    uploadBtn.onclick = async () => {
        const files = fileInput.files;
        if (files.length === 0) return alert("Chưa chọn ảnh!");

        uploadBtn.disabled = true;
        let urls = [];
        resultArea.innerHTML = "";
        if(document.getElementById('showResult').checked) resultArea.style.display = "block";

        for (let i = 0; i < files.length; i++) {
            status.innerText = `⚙️ Đang xử lý ${i+1}/${files.length}...`;
            status.style.color = "#d35400";

            const base64 = await processImage(files[i]);
            const payload = {
                base64: base64,
                type: "image/jpeg",
                name: "NMNV_" + Date.now() + ".jpg",
                category: document.getElementById('category').value
            };

            try {
                const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                const res = await response.json();
                if (res.status === "success") {
                    urls.push(res.url);
                    resultArea.innerHTML += `<div>✅ ${files[i].name} -> <a href="${res.url}" target="_blank">Link</a></div>`;
                }
            } catch (e) { console.error(e); }
        }

        status.innerText = "🚀 HOÀN THÀNH!";
        status.style.color = "#27ae60";

        if (document.getElementById('copyUrl').checked && urls.length > 0) {
            navigator.clipboard.writeText(urls.join("\n"));
            alert("Đã copy toàn bộ URL vào bộ nhớ tạm!");
        }
        
        uploadBtn.disabled = false;
    };
</script>

</body>
</html>
